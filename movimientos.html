<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PantryFlow - Movimientos</title>
  <script src="https://cdn.tailwindcss.com"></script>


<style>
  body.mode-entrada {
    background-color: #0a0f0c;
  }

  body.mode-salida {
    background-color: #120606;
  }

  /* Glow cabecera modo entrada */
  body.mode-entrada .cabecera {
    box-shadow: 0 0 100px rgba(16,185,129,0.25);
    border-color: rgba(16,185,129,0.2);
  }

  /* Glow cabecera modo salida */
  body.mode-salida .cabecera {
    box-shadow: 0 0 100px rgba(255,0,0,0.25);
    border-color: rgba(255,0,0,0.2);
  }
</style>

</head>

<body class="h-screen overflow-hidden bg-zinc-950 text-zinc-200 mode-entrada">

  <!-- CABECERA -->
   <div class="cabecera w-full bg-gradient-to-r from-zinc-900 via-zinc-900 to-zinc-900
            backdrop-blur-xl border-b border-white/10
            transition-all duration-500 py-6 px-10">
  
    <div class="flex justify-between items-center max-w-6xl mx-auto">
      <h1 class="text-2xl tracking-[0.3em] text-emerald-400 font-semibold">
        REGISTRAR MOVIMIENTO
      </h1>

      <a href="index.html"
         class="text-sm text-zinc-400 hover:text-emerald-400 transition">
        ← Volver
      </a>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="max-w-xl mx-auto h-[calc(100vh-96px)] flex flex-col justify-center px-6">

    <div class="space-y-6">

      <!-- SELECT PRODUCTO -->
      <select
        class="w-full px-4 py-3 rounded-xl
               bg-white/5 backdrop-blur-xl
               border border-white/10
               shadow-[2px_2px_6px_rgba(0,167,42,0.6)]
               focus:outline-none
               transition-all duration-200">
        <option>Seleccionar producto</option>
        <option>POLLO</option>
        <option>ARROZ</option>
        <option>HUEVOS</option>
      </select>

      <!-- TOGGLE ENTRADA / SALIDA -->
      <div class="flex bg-white/5 rounded-xl overflow-hidden border border-white/10">

        <button id="btnEntrada"
          class="flex-1 py-3 bg-emerald-500/80 text-black font-semibold">
          Entrada
        </button>

        <button id="btnSalida"
          class="flex-1 py-3 bg-transparent text-zinc-400 font-semibold">
          Salida
        </button>

      </div>

      <!-- CANTIDAD -->
      <input type="number" placeholder="Cantidad"
        class="w-full px-4 py-3 rounded-xl
               bg-white/5 backdrop-blur-xl
               border border-white/10
               shadow-[2px_2px_6px_rgba(0,167,42,0.6)]
               focus:outline-none
               transition-all duration-200" />

      <!-- FECHA (solo diseño por ahora) -->
      <input type="date"
        class="w-full px-4 py-3 rounded-xl
               bg-white/5 backdrop-blur-xl
               border border-white/10
               shadow-[2px_2px_6px_rgba(0,167,42,0.6)]
               focus:outline-none
               transition-all duration-200" />

      <!-- BOTÓN CONFIRMAR -->
      <button
        class="w-full py-4 rounded-xl
               bg-emerald-500/80 hover:bg-emerald-400
               text-black font-semibold
               shadow-[0_10px_30px_rgba(16,185,129,0.4)]
               transition-all duration-200">
        CONFIRMAR
      </button>

    </div>

  </div>

  <script>
    const btnEntrada = document.getElementById("btnEntrada");
    const btnSalida = document.getElementById("btnSalida");
    const body = document.body;

    btnEntrada.addEventListener("click", () => {
      body.classList.remove("mode-salida");
      body.classList.add("mode-entrada");

      btnEntrada.classList.add("bg-emerald-500/80", "text-black");
      btnSalida.classList.remove("bg-red-500/80", "text-black");
      btnSalida.classList.add("text-zinc-400");
    });

    btnSalida.addEventListener("click", () => {
      body.classList.remove("mode-entrada");
      body.classList.add("mode-salida");

      btnSalida.classList.add("bg-red-500/80", "text-black");
      btnEntrada.classList.remove("bg-emerald-500/80", "text-black");
      btnEntrada.classList.add("text-zinc-400");
    });
  </script>

</body>
</html>
