<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PantryFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
<style>
  @keyframes fadeInSoft {
    from {
      opacity: 0;
      transform: translateY(15px);
      filter: blur(6px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }
  }

  .fade-in {
    animation: fadeInSoft 0.6s ease-out forwards;
  }
</style></head>
<body class="h-screen overflow-hidden bg-zinc-950 text-zinc-200 fade-in" 
      style="opacity: 0;">

  <!-- CABECERA FULL WIDTH -->
  <div class="w-full bg-gradient-to-r from-emerald-900/40 via-zinc-900 to-emerald-900/40 
              backdrop-blur-xl border-b border-emerald-500/20 
              shadow-[0_0_100px_rgba(16,185,129,0.2)] py-6 px-10">

    <div class="flex justify-between items-center max-w-6xl mx-auto">
      <div>
        <h1 class="text-2xl tracking-[0.3em] text-emerald-400 font-semibold">
          PANTRYFLOW
        </h1>
        <p class="text-xs text-zinc-400 tracking-widest">
          INVENTARIO DOMÉSTICO INTELIGENTE
        </p>
      </div>

      <a href="productos.html"
         class="px-5 py-2 rounded-lg
                bg-emerald-500/80 hover:bg-emerald-400
                text-black font-semibold
                shadow-[0_8px_20px_rgba(16,185,129,0.4)]
                transition-all duration-200">
        Gestionar productos
      </a>
      <a href="movimientos.html"
          class="px-5 py-2 rounded-lg
          bg-zinc-700 hover:bg-zinc-600
          text-white font-semibold
          shadow-[0_8px_20px_rgba(0,0,0,0.4)]
          transition-all duration-200">
          Registrar movimiento
      </a>
    </div>

  </div>

  <!-- CONTENIDO -->
  <div class="max-w-6xl mx-auto h-[calc(100vh-96px)] flex flex-col px-10 py-8">

    <!-- TITULO SECCIÓN -->
    <div class="mb-6">
      <h2 class="text-emerald-400 tracking-widest text-sm uppercase">
        Stock actual
      </h2>
    </div>

    <!-- CONTENEDOR STOCK -->
    <div id="stock-container"
         class="flex-grow overflow-y-auto space-y-4 pr-2">

      <!-- Las cards se generan por JS -->

    </div>

  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config/supabase.js"></script>
  <script src="js/app.js"></script>

  <script>
  document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {
      const href = this.getAttribute("href");
      if (!href || href.startsWith("#")) return;

      e.preventDefault();

      document.body.style.transition = "all 0.5s ease";
      document.body.style.opacity = "0";
      document.body.style.transform = "translateY(-10px)";
      document.body.style.filter = "blur(4px)";

      setTimeout(() => {
        window.location.href = href;
      }, 300);
    });
  });
</script>

</body>
</html>
