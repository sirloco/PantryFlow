<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>PantryFlow - Menús</title>
        <link rel="icon" href="/favicon.ico" />
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- SUPABASE LIBRERÍA -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <style>
            .clamp-2 {
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .dragging-card {
                opacity: 0.5;
                transform: scale(1.05);
            }
        </style>
    </head>

    <body class="bg-zinc-950 text-zinc-200 p-8">
        <div id="header"></div>

        <script>
            fetch("/header.html")
                .then((r) => r.text())
                .then((html) => {
                    document.getElementById("header").innerHTML = html;
                });
        </script>
        <div class="flex gap-3 mb-6">
            <button
                id="loadMenu"
                class="px-4 py-2 bg-zinc-800 rounded hover:bg-zinc-700"
            >
                Cargar menú actual
            </button>

            <button
                id="loadHistory"
                class="px-4 py-2 bg-zinc-800 rounded hover:bg-zinc-700"
            >
                Menús anteriores
            </button>

            <button
                id="generarMenu"
                class="px-4 py-2 bg-emerald-500 text-black rounded font-semibold"
            >
                Generar nuevo menú
            </button>

            <button
                id="saveMenu"
                class="px-4 py-2 bg-zinc-800 rounded hover:bg-zinc-700"
            >
                Guardar menú
            </button>
            <button
                id="addRecipe"
                class="px-4 py-2 bg-zinc-800 rounded hover:bg-zinc-700"
            >
                Añadir receta
            </button>
            <button
                id="shoppingList"
                class="px-4 py-2 bg-zinc-800 rounded hover:bg-zinc-700"
            >
                Lista de compra
            </button>
        </div>
        <div id="menu-container" class="space-y-6"></div>

        <div
            id="modalReceta"
            class="hidden fixed inset-0 bg-black/70 flex items-center justify-center"
        >
            <div class="bg-zinc-900 p-6 rounded-xl w-96 space-y-4">
                <h3 class="text-lg font-semibold">Añadir receta HF</h3>

                <input
                    id="hfId"
                    placeholder="ID receta (ej: 255)"
                    class="w-full p-2 bg-zinc-800 rounded"
                />

                <select id="diaReceta" class="w-full p-2 bg-zinc-800 rounded">
                    <option value="0">Sábado</option>
                    <option value="1">Domingo</option>
                    <option value="2">Lunes</option>
                    <option value="3">Martes</option>
                    <option value="4">Miércoles</option>
                    <option value="5">Jueves</option>
                </select>

                <select
                    id="momentoReceta"
                    class="w-full p-2 bg-zinc-800 rounded"
                >
                    <option value="comida">Comida</option>
                    <option value="cena">Cena</option>
                </select>

                <div class="flex gap-3">
                    <button
                        id="guardarReceta"
                        class="bg-emerald-500 px-4 py-2 rounded text-black"
                    >
                        Guardar
                    </button>

                    <button
                        id="cancelarReceta"
                        class="bg-zinc-700 px-4 py-2 rounded"
                    >
                        Cancelar
                    </button>
                </div>
            </div>
        </div>
        <div
            id="modalEquivalencia"
            class="hidden fixed inset-0 bg-black/60 flex items-center justify-center"
        >
            <div class="bg-zinc-900 p-6 rounded-xl w-96 space-y-4">
                <h3 class="text-lg font-semibold">Crear equivalencia</h3>

                <p>
                    Ingrediente HF:
                    <span id="hfIngrediente"></span>
                </p>

                <select
                    id="productoEquivalente"
                    class="w-full p-2 bg-zinc-800 rounded"
                ></select>

                <div class="text-sm text-zinc-400 mt-2">
                    <div id="infoSize"></div>
                </div>

                <label class="block text-sm">Unidad HF</label>
                <input
                    id="unidadHF"
                    class="w-full p-2 bg-zinc-800 rounded"
                    placeholder="unidad, ml, g"
                />

                <label class="block text-sm">Factor conversión</label>
                <input
                    id="factorConversion"
                    type="number"
                    step="0.01"
                    class="w-full p-2 bg-zinc-800 rounded"
                    placeholder="ej: 80"
                />

                <div class="flex gap-3">
                    <button
                        id="guardarEquivalencia"
                        class="bg-emerald-500 px-4 py-2 rounded text-black"
                    >
                        Guardar
                    </button>
                    <button
                        id="ignorarEquivalencia"
                        class="bg-zinc-700 px-4 py-2 rounded"
                    >
                        Ignorar
                    </button>
                </div>
            </div>
        </div>
        <div
            id="toast"
            class="fixed bottom-6 right-6 bg-emerald-500 text-black px-4 py-2 rounded shadow-lg hidden"
        ></div>

        <!-- CONFIG -->
        <script src="config/supabase.js"></script>

        <!-- TU CÓDIGO -->
        <script type="module" src="js/menu.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/plugins/Swap/Swap.min.js"></script>
    </body>
</html>
