<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>PantryFlow - Menús</title>

        <script src="https://cdn.tailwindcss.com"></script>

        <!-- SUPABASE LIBRERÍA -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="/config/supabase.js"></script>
    </head>

    <body class="bg-zinc-950 text-zinc-200 p-8">
        <h1 class="text-xl mb-6 text-emerald-400">Generar menú semanal</h1>

        <button
            id="generarMenu"
            class="bg-emerald-500 px-6 py-3 rounded text-black font-semibold"
        >
            Generar menú
        </button>

        <h2 class="mt-8 mb-4 text-emerald-400">Recetas elegidas</h2>
        <div id="menu-container" class="space-y-6"></div>

        <h2 class="mt-8 mb-4 text-emerald-400">Lista de compra</h2>
        <div id="lista-compra" class="space-y-1"></div>

        <!-- CONFIG -->
        <script src="config/supabase.js"></script>

        <!-- TU CÓDIGO -->
        <script type="module" src="js/menu.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/plugins/Swap/Sortable.swap.min.js"></script>
    </body>
</html>
