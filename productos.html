<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PantryFlow - Gestión Productos</title>
  <script src="https://cdn.tailwindcss.com"></script>
<style>
  @keyframes fadeInSoft {
    from {
      opacity: 0;
      transform: translateY(15px);
      filter: blur(6px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }
  }

  .fade-in {
    animation: fadeInSoft 0.6s ease-out forwards;
  }
</style>
</head>
<body class="h-screen overflow-hidden bg-zinc-950 text-zinc-200 fade-in"
      style="opacity: 0;">

  <!-- CABECERA FULL WIDTH -->
  <div class="w-full bg-gradient-to-r from-emerald-900/40 via-zinc-900 to-emerald-900/40 
              backdrop-blur-xl border-b border-emerald-500/20 
              shadow-[0_0_100px_rgba(16,185,129,0.2)] py-6 px-10">

    <div class="flex justify-between items-center max-w-6xl mx-auto">
      <h1 class="text-2xl tracking-[0.3em] text-emerald-400 font-semibold">
        GESTIÓN DE PRODUCTOS
      </h1>

      <a href="index.html"
         class="text-sm text-zinc-400 hover:text-emerald-400 transition">
        ← Volver
      </a>
    </div>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="max-w-6xl mx-auto h-[calc(100vh-96px)] flex flex-col px-10 py-8">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-16 flex-grow">

      <!-- FORMULARIO -->
      <div class="space-y-5">

        <input 
          type="text" 
          placeholder="Buscar producto..."
          class="w-full px-4 py-3 rounded-xl 
                bg-white/5 backdrop-blur-xl
                shadow-[2px_2px_2px_rgba(0,167,42,0.90)]
                focus:outline-none
                focus:ring-2 
                focus:ring-purple-100/10" />
         
        <input 
          id="nombre" 
          type="text" 
          placeholder="Nombre"
          class="w-full px-4 py-3 rounded-xl
                bg-white/5 backdrop-blur-xl
                shadow-[2px_2px_2px_rgba(0,167,42,0.90)]         
                focus:outline-none
                focus:ring-2 
                focus:ring-purple-100/10" />

        <input 
          id="codigo_barras" 
          type="text" 
          placeholder="Código de barras"
          class="w-full px-4 py-3 rounded-xl 
                bg-white/5 backdrop-blur-md 
                shadow-[2px_2px_2px_rgba(0,167,42,0.90)]
                focus:outline-none
                focus:ring-2 
                focus:ring-purple-100/10" />

        <select 
          id="categoria"
          class="w-full px-4 py-3 rounded-xl bg-white/5 backdrop-blur-md 
                shadow-[2px_2px_2px_rgba(0,167,42,0.90)]
                focus:outline-none
                focus:ring-2 
                focus:ring-purple-100/10">
          <option>Categoría</option>
          <option>fresco</option>
          <option>seco</option>
          <option>refrigerado</option>
        </select>

        <select 
          id="unidad"
          class="w-full px-4 py-3 rounded-xl bg-white/5 backdrop-blur-md 
                 border border-white/10
                shadow-[2px_2px_2px_rgba(0,167,42,0.90)]
                focus:outline-none
                focus:ring-2 
                focus:ring-purple-100/10">
          <option>Unidad</option>
          <option>g</option>
          <option>L</option>
          <option>unit</option>
        </select>

        <input 
          id="unit_size" 
          type="number" 
          placeholder="Cantidad por unidad (ej: 150)"
          class="w-full px-4 py-3 rounded-xl 
                bg-white/5 backdrop-blur-md
                shadow-[2px_2px_2px_rgba(0,167,42,0.90)]
                focus:outline-none
                focus:ring-2 
                focus:ring-purple-100/10" />
        
        <input 
          id="cantidad_inicial"
          type="number"
          placeholder="Cantidad inicial comprada"
          class="w-full px-4 py-3 rounded-xl 
                bg-white/5 backdrop-blur-md
                shadow-[2px_2px_2px_rgba(0,167,42,0.90)]
                focus:outline-none
                focus:ring-2 
                focus:ring-purple-100/10" />

      </div>

      <!-- IMAGEN + BOTONES -->
      <div class="flex flex-col items-center justify-start space-y-8">

        <div class="w-64 h-64 rounded-2xl border border-emerald-500/20
                    bg-white/5 backdrop-blur-xl flex items-center justify-center
                    text-zinc-500 text-sm
                    shadow-[inset_0_1px_0_rgba(255,255,255,0.05),0_20px_60px_rgba(0,0,0,0.6),0_0_60px_rgba(16,185,129,0.15)]">
          Imagen producto<br>250 x 250
        </div>

        <div class="w-full flex gap-6">
          
          <button
            id="guardarProducto"
            class="flex-1 py-4 rounded-lg bg-emerald-500/80
                   hover:bg-emerald-400 text-black font-semibold
                   shadow-[0_10px_30px_rgba(16,185,129,0.4)]
                   active:translate-y-1 active:shadow-none
                   transition-all duration-200">
            GUARDAR
          </button>

          <button
            class="flex-1 py-4 rounded-lg bg-red-500/70
                   hover:bg-red-400 text-black font-semibold
                   shadow-[0_10px_30px_rgba(255,0,0,0.25)]
                   active:translate-y-1 active:shadow-none
                   transition-all duration-200">
            ELIMINAR
          </button>

        </div>

      </div>

    </div>

    <!-- LISTA PRODUCTOS -->
    <div class="mt-10 flex-grow flex flex-col
              ">

      <div class="grid grid-cols-3 text-xs uppercase tracking-widest text-emerald-400 pb-3 border-b border-white/10">
        <div>Nombre</div>
        <div>Categoría</div>
        <div class="text-right">Unidad</div>
      </div>

      <div id="stock-container" class="flex-grow overflow-y-auto mt-4 space-y-3 pr-2">

        <div class="grid grid-cols-3 bg-white/5 backdrop-blur-md 
                    px-4 py-3 rounded-xl border border-white/10
                    shadow-[2px_2px_6px_rgba(0,167,42,0.6)]
                    transition-all duration-200
                    hover:shadow-[4px_4px_12px_rgba(0,167,42,0.9)]
                    hover:translate-y-[-2px]">
          <div>POLLO</div>
          <div class="text-zinc-400">fresco</div>
          <div class="text-right text-emerald-400">g</div>
        </div>

        <div class="grid grid-cols-3 bg-white/5 backdrop-blur-md 
                    px-4 py-3 rounded-xl border border-white/10
                    shadow-[2px_2px_6px_rgba(0,167,42,0.6)]
                    transition-all duration-200
                    hover:shadow-[4px_4px_12px_rgba(0,167,42,0.9)]
                    hover:translate-y-[-2px]">
          <div>ARROZ</div>
          <div class="text-zinc-400">seco</div>
          <div class="text-right text-emerald-400">g</div>
        </div>

        <div class="grid grid-cols-3 bg-white/5 backdrop-blur-md 
                    px-4 py-3 rounded-xl border border-white/10
                    shadow-[2px_2px_6px_rgba(0,167,42,0.6)]
                    transition-all duration-200
                    hover:shadow-[4px_4px_12px_rgba(0,167,42,0.9)]
                    hover:translate-y-[-2px]">
          <div>HUEVOS</div>
          <div class="text-zinc-400">refrigerado</div>
          <div class="text-right text-emerald-400">unit</div>
        </div>

      </div>

    </div>

  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config/supabase.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", function(e) {
        const href = this.getAttribute("href");
        if (!href || href.startsWith("#")) return;

        e.preventDefault();

        document.body.style.transition = "all 0.5s ease";
        document.body.style.opacity = "0";
        document.body.style.transform = "translateY(-10px)";
        document.body.style.filter = "blur(4px)";

        setTimeout(() => {
          window.location.href = href;
        }, 300);
      });
    });
  </script>
</body>
</html>
